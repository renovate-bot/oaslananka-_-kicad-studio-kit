packages:
  - "apps/vscode-extension"
  - "packages/mcp-server"
  - "packages/mcp-npm"

allowBuilds:
  "@go-task/cli": true
  "@vscode/vsce-sign": true
  esbuild: true
  unrs-resolver: true

ignoredOptionalDependencies:
  - keytar

overrides:
  "@vscode/vsce>keytar": "-"
  encoding-sniffer: 1.0.2
  exceljs>archiver: 8.0.0
  exceljs>fast-csv: 5.0.7
  exceljs>unzipper: 0.12.3
  diff: 8.0.4
  esbuild: 0.25.0
  glob: 13.0.6
  mocha>serialize-javascript: 7.0.5
  qs: 6.15.2
  test-exclude: 8.0.0
  uuid: 14.0.0
  vite: 6.4.2
