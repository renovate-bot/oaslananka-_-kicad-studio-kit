schema_version: 1
repository:
  owner: oaslananka
  name: kicad-studio-kit
  canonical_url: https://github.com/oaslananka/kicad-studio-kit
  classification: product-monorepo
  support_tier: tier-1
  primary_branch: main
products:
  - id: kicad-studio
    path: apps/vscode-extension
    package: oaslananka.kicadstudiokit
    support_tier: tier-1
required_workflows:
  - ci.yml
  - security.yml
  - codeql.yml
  - gitleaks.yml
  - scorecard.yml
  - docs.yml
  - release-please.yml
  - publish-extension.yml
  - release.yml
  - dependency-review.yml
governance:
  renovate:
    config: renovate.json
    dependency_dashboard: true
    major_updates_require_dashboard_approval: true
    grouped_patch_minor_surfaces:
      - root-tooling
      - vscode-extension
  canonical_policy:
    document: CANONICAL.md
  reusable_workflows:
    status: gap-documented
    document: docs/reusable-workflows.md
