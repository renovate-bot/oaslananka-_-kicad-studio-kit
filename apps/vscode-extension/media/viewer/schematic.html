<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'nonce-{{scriptNonce}}' {{cspSource}};
    style-src 'nonce-{{scriptNonce}}' {{cspSource}};
    font-src {{cspSource}};
    img-src {{cspSource}} data:;
  ">
  <title>KiCad Schematic Viewer</title>
  <link rel="stylesheet" href="{{viewerCssUri}}">
  <style nonce="{{scriptNonce}}">
    :root {
      --bg: var(--vscode-editor-background, #0f172a);
      --panel: var(--vscode-editorWidget-background, var(--vscode-editor-background, #1e293b));
      --text: var(--vscode-foreground, #e2e8f0);
      --muted: var(--vscode-descriptionForeground, #94a3b8);
      --border: var(--vscode-panel-border, var(--vscode-editorWidget-border, rgba(148,163,184,.25)));
      --accent: var(--vscode-focusBorder, #38bdf8);
      --btn-bg: var(--vscode-button-secondaryBackground, #1e293b);
      --btn-fg: var(--vscode-button-secondaryForeground, #e2e8f0);
      --btn-hover: var(--vscode-button-secondaryHoverBackground, #334155);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font: 13px/1.5 "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #viewer-shell { display: grid; grid-template-rows: auto auto 1fr; height: 100vh; min-height: 0; }
    #toolbar { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    button { color: var(--btn-fg); background: var(--btn-bg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 9px; cursor: pointer; font: inherit; font-size: 12px; transition: background 0.1s; white-space: nowrap; }
    button:hover { background: var(--btn-hover); }
    button:active { opacity: 0.8; }
    .separator { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .status { color: var(--muted); margin-left: auto; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    #loading-overlay, #error-overlay { color: var(--text); text-align: center; }
    #error-message { display: block; font-weight: 600; margin-bottom: 8px; }
    #error-details {
      max-width: min(900px, calc(100vw - 64px));
      max-height: 45vh;
      overflow: auto;
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      text-align: left;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
    }
    #diagnostic-banner {
      display: block;
      padding: 5px 12px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="viewer-shell">
    <div id="diagnostic-banner">Interactive KiCanvas mode is active.</div>
    <div id="toolbar">
      <button id="btn-zoom-fit" aria-label="Fit to screen" title="Fit to Screen">⊡</button>
      <button id="btn-zoom-in" aria-label="Zoom in" title="Zoom In">+</button>
      <button id="btn-zoom-out" aria-label="Zoom out" title="Zoom Out">−</button>
      <button id="btn-grid" aria-label="Toggle grid" title="Toggle Grid">#</button>
      <span class="separator"></span>
      <button id="btn-theme" aria-label="Toggle theme" title="Toggle Theme">◑</button>
      <button id="btn-open-kicad" aria-label="Open in KiCad" title="Open in KiCad">↗</button>
      <span id="status-text" class="status">Waiting for schematic…</span>
    </div>
    <div id="viewer-layout" class="compact">
      <div id="viewer-container">
        <kicanvas-embed id="viewer" controls="full" controlslist="zoom pan select"></kicanvas-embed>
        <div id="loading-overlay" hidden>
          <div class="spinner" aria-hidden="true"></div>
          <span>Loading schematic…</span>
        </div>
        <div id="error-overlay" hidden>
          <span id="error-message"></span>
          <pre id="error-details"></pre>
        </div>
      </div>
      <aside id="info-panel">
        <h3>Selection</h3>
        <div id="component-info" class="property-list">
          No item selected
        </div>
      </aside>
    </div>
  </div>
  <script id="initial-payload" nonce="{{scriptNonce}}" type="application/json">{{initialPayload}}</script>
  <script nonce="{{scriptNonce}}" src="{{kicanvasUri}}"></script>
  <script nonce="{{scriptNonce}}" src="{{viewerScriptUri}}"></script>
</body>
</html>
