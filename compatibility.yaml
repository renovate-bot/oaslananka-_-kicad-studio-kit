schemaVersion: 1
updated: "2026-05-27"
source: "https://github.com/oaslananka/kicad-studio-kit"

kicad:
  # latestVerified must point to a published KiCad stable release confirmed by
  # the official KiCad release notes and the KiCad/kicad-source-mirror release
  # tag. Do not forward-reference patch numbers before both sources exist.
  primary: "10.0.x"
  latestVerified: "10.0.3"
  supported:
    - range: "10.0.x"
      state: "primary"
      ci: "required"
      notes: "Primary optimized KiCad CLI and file-format target."
    # Upstream ended active KiCad 9.x maintenance after KiCad 10.0.0 and
    # described 9.0.9 as the final 9.0 bug-fix release. Keep this line in
    # scheduled, non-blocking canaries until removal is announced in the next
    # minor release.
    - range: "9.x"
      state: "deprecated"
      upstreamEol: true
      ci: "scheduled"
      removal: "next-minor-release"
      notes: "Upstream KiCad 9.x is no longer actively maintained; core workflows remain best-effort while scheduled canaries gather removal evidence."
    - range: "8.x"
      state: "deprecated"
      ci: "manual"
      notes: "File-level read and migration support only; removal requires a release note."
  dropped: []

kicadIpcReadiness:
  reviewed: "2026-05-26"
  sources:
    pcbnewDeprecation: "https://dev-docs.kicad.org/en/apis-and-binding/pcbnew/"
    commandLine: "https://docs.kicad.org/master/en/cli/cli.html"
    nightlies: "https://www.kicad.org/help/nightlies-and-rcs/"
  directPcbnewImports:
    policy: "forbidden-in-production"
    allowedPaths:
      - "packages/mcp-server/scripts/check_no_pcbnew.py"
      - "packages/mcp-server/tests/**"
  manualCanary:
    currentNightlyRange: "10.99.x"
    releaseCandidateRange: "11.0.x"
    currentNightlyCommand: "corepack pnpm run test:kicad-cli-contract:nightly"
    releaseCandidateCommand: "corepack pnpm run test:kicad-cli-contract:future"
  ipcApi:
    requiredFor:
      projectDiscovery:
        tools: ["kicad_get_project_info", "kicad_set_project"]
        canaryProbes:
          [
            "version",
            "path-with-spaces-board-stats",
            "unicode-path-board-stats",
          ]
        evidence:
          - "packages/mcp-server/tests/integration/test_project_library_surface.py"
          - "packages/mcp-server/tests/unit/test_discovery.py"
      pcbRead:
        tools:
          [
            "pcb_get_board_summary",
            "pcb_get_tracks",
            "pcb_get_footprints",
            "pcb_get_nets",
          ]
        canaryProbes:
          [
            "board-stats",
            "path-with-spaces-board-stats",
            "unicode-path-board-stats",
          ]
        evidence:
          - "packages/mcp-server/tests/integration/test_pcb_tools.py"
          - "packages/mcp-server/tests/gui/test_kicad_gui_live_context.py"
      schematicRead:
        tools: ["sch_get_symbols", "sch_get_sheet_info", "sch_get_net_names"]
        canaryProbes: ["clean-erc", "schematic-pdf", "bom", "netlist"]
        evidence:
          - "packages/mcp-server/tests/integration/test_schematic_tools.py"
          - "packages/mcp-server/tests/integration/test_project_library_surface.py"
      drc:
        tools: ["run_drc", "validate_design", "check_design_for_manufacture"]
        canaryProbes: ["clean-drc", "dirty-drc"]
        evidence:
          - "packages/mcp-server/tests/integration/test_export_tools.py"
          - "packages/mcp-server/tests/integration/test_pcb_export_validation_surface.py"
      erc:
        tools: ["run_erc", "validate_design", "schematic_quality_gate"]
        canaryProbes: ["clean-erc", "dirty-erc"]
        evidence:
          - "packages/mcp-server/tests/integration/test_export_tools.py"
          - "packages/mcp-server/tests/integration/test_schematic_connectivity_gate.py"
      export:
        tools:
          [
            "export_gerber",
            "export_drill",
            "export_manufacturing_package",
            "export_bom",
            "export_netlist",
          ]
        canaryProbes:
          [
            "schematic-pdf",
            "schematic-pdf-no-property-popups",
            "pcb-pdf",
            "pcb-svg",
            "pcb-dxf",
            "gerbers",
            "drill",
            "step",
          ]
        evidence:
          - "packages/mcp-server/tests/integration/test_export_tools.py"
          - "packages/mcp-server/tests/unit/test_kicad_canary.py"
      diagnostics:
        tools: ["kicad_get_version", "kicad_get_server_info", "kicad_help"]
        canaryProbes: ["version", "read-only-output-failure"]
        evidence:
          - "packages/mcp-server/tests/unit/test_server_info_contract.py"
          - "packages/mcp-server/tests/unit/test_cli_diagnostics.py"

vscode:
  minimum: "1.120.0"
  enginesRange: "^1.120.0"
  stable: "current"
  insiders: "current"
  nodeRuntime: "24.x"
  state: "primary"

node:
  range: ">=24.11.0 <25"
  primary: "24.x"

pnpm:
  range: ">=11.0.0 <12"
  primary: "11.x"

python:
  range: ">=3.13"
  primary: "3.13"
  supported:
    - "3.13"
    - "3.14"

runtimePolicy:
  reviewed: "2026-05-26"
  sources:
    vscodeStable: "https://update.code.visualstudio.com/api/releases/stable"
    vscodeInsiders: "https://update.code.visualstudio.com/api/update/linux-x64/insider/latest"
    pythonReleases: "https://peps.python.org/api/python-releases.json"
    kicadDownloads: "https://www.kicad.org/download/linux/"
  vscode:
    maxMinimumMinorLag: 1
    loweringRequiresChangelog: "apps/vscode-extension/CHANGELOG.md"
  python:
    supportedMinorWindow: 2
    loweringRequiresChangelog: "packages/mcp-server/CHANGELOG.md"
  kicad:
    primaryMajorLag: 0
    loweringRequiresChangelogs:
      - "apps/vscode-extension/CHANGELOG.md"
      - "packages/mcp-server/CHANGELOG.md"

mcp:
  protocolVersion: "2025-11-25"
  toolSchema: "1.0"
  registrySchema: "2025-12-11"

products:
  kicad-studio:
    packagePath: "apps/vscode-extension/package.json"
    version: "2.8.3"
    compatibleMcpPro:
      required: ">=3.5.2 <4.0.0"
      recommended: ">=3.5.2 <4.0.0"
      testedAgainst: "3.5.2"
  kicad-mcp-pro:
    packagePath: "packages/mcp-server/pyproject.toml"
    version: "3.5.2"
    compatibleExtension:
      required: ">=2.8.3 <3.0.0"
      testedAgainst: "2.8.3"

featureGates:
  projectDiscovery:
    kicad: ["8.x", "9.x", "10.0.x"]
    tools: ["kicad_get_project_info", "kicad_set_project"]
  schematicRead:
    kicad: ["8.x", "9.x", "10.0.x"]
    tools: ["sch_get_symbols"]
  pcbRead:
    kicad: ["8.x", "9.x", "10.0.x"]
    tools: ["pcb_get_board_summary"]
  manufacturingExports:
    kicad: ["9.x", "10.0.x"]
    tools: ["export_gerber", "export_drill", "export_manufacturing_package"]
  kicad10Variants:
    kicad: ["10.0.x"]
    tools: ["variant_list", "variant_set_active"]
  kicad10AdvancedExports:
    kicad: ["10.0.x"]
    tools: ["export_odb", "pcb_export_3d_pdf"]

mcpTools:
  required:
    - "kicad_get_version"
    - "kicad_get_project_info"
    - "kicad_set_project"
    - "sch_get_symbols"
    - "pcb_get_board_summary"
    - "export_gerber"
    - "export_drill"
    - "export_manufacturing_package"
  optional:
    - "variant_list"
    - "variant_set_active"
    - "export_odb"
    - "pcb_export_3d_pdf"
    - "dfm_run_manufacturer_check"

releaseGate:
  required:
    - "compatibility.yaml validates"
    - "Product versions match release manifests"
    - "Extension MCP compatibility range matches embedded compatibility metadata"
    - "MCP protocol and tool schema metadata match server discovery metadata"
    - "Required MCP tools exist in the generated tool reference"
    - "KiCad, VS Code, Node, pnpm, and Python support ranges match package metadata"
  blockers:
    - "Primary KiCad compatibility failure"
    - "VS Code stable compatibility failure"
    - "MCP protocol or required tool contract failure"
    - "Missing or inconsistent compatibility metadata"
