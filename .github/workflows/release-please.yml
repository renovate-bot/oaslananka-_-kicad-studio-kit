name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  pnpm_config_pm_on_fail: ignore

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When Release Please has an OPEN release PR, sync the version surfaces it
      # does not bump itself (compatibility metadata + the generated docs tables)
      # onto its branch. Release Please only updates package.json, the manifest,
      # and the changelog, so without this the release PR's own CI fails on
      # compatibility.yaml / compatibilityMatrix.ts / generated-docs version
      # drift and the release can never be merged.
      - if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          fetch-depth: 0
          persist-credentials: true
      - if: ${{ steps.release.outputs.pr }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - if: ${{ steps.release.outputs.pr }}
        run: corepack enable
      - if: ${{ steps.release.outputs.pr }}
        run: corepack prepare pnpm@11.6.0 --activate
      - if: ${{ steps.release.outputs.pr }}
        run: corepack pnpm install --frozen-lockfile
      - if: ${{ steps.release.outputs.pr }}
        run: corepack pnpm run release:surface
      - if: ${{ steps.release.outputs.pr }}
        run: corepack pnpm run docs:generate
      - if: ${{ steps.release.outputs.pr }}
        run: |
          git config user.name "kicad-studio-bot"
          git config user.email "kicad-studio-bot@users.noreply.github.com"
          git add -A
          # --no-verify: this is an automated bot commit of deterministically
          # generated surfaces. Skipping husky avoids running lint-staged on
          # commit and the full `pnpm run check` pre-push hook inside this job;
          # the release PR's own CI re-validates every surface.
          git diff --cached --quiet || git commit --no-verify -m "chore(repo): sync release surfaces for the pending release"
          git push --no-verify

      # Regenerate changelog docs after a release PR is merged
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: true
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - if: ${{ steps.release.outputs.release_created }}
        run: corepack enable
      - if: ${{ steps.release.outputs.release_created }}
        run: corepack prepare pnpm@11.6.0 --activate
      - if: ${{ steps.release.outputs.release_created }}
        run: corepack pnpm install --frozen-lockfile
      - if: ${{ steps.release.outputs.release_created }}
        run: corepack pnpm run docs:generate
      - if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name "kicad-studio-bot"
          git config user.email "kicad-studio-bot@users.noreply.github.com"
          git add -A
          # --no-verify: automated bot commit of generated docs; skip husky so
          # this job does not run lint-staged / the full pre-push check.
          git diff --cached --quiet || git commit --no-verify -m "docs(repo): regenerate changelog and versions after release"
          git push --no-verify

      # Release Please creates releases with GITHUB_TOKEN, which does not
      # recursively trigger release-event workflows. Dispatch the publish
      # workflow explicitly so packaging, evidence, and marketplaces run.
      - if: ${{ steps.release.outputs.release_created }}
        name: Publish extension to marketplaces
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag_name }}"
          echo "Triggering publish-extension workflow for tag ${tag}…"
          gh workflow run publish-extension.yml \
            --ref "${tag}" \
            -f release_tag="${tag}"
