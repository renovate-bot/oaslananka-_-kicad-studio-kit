name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
          version-file: packages/mcp-server/uv.toml
      - name: Synchronize generated release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          branch_output="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --limit 100 \
            --json headRefName \
            --jq '.[] | select(.headRefName | startswith("release-please--branches--main")) | .headRefName')"

          branches=()
          if [ -n "${branch_output}" ]; then
            mapfile -t branches <<< "${branch_output}"
          fi

          if [ "${#branches[@]}" -eq 0 ]; then
            echo "No open Release Please PR branches found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for branch in "${branches[@]}"; do
            echo "::group::${branch}"
            git fetch origin "${branch}"
            git switch --force-create release-metadata-sync "origin/${branch}"

            corepack enable
            corepack pnpm install --frozen-lockfile
            # Release Please branches can lag main; match uv to the branch pin before syncing.
            branch_uv_version="$(sed -nE 's/^required-version[[:space:]]*=[[:space:]]*"([^"]+)".*$/\1/p' packages/mcp-server/uv.toml)"
            if [ -z "${branch_uv_version}" ]; then
              echo "Unable to read required uv version from packages/mcp-server/uv.toml" >&2
              exit 1
            fi

            current_uv_version="$(uv --version | awk '{print $2}')"
            if [ "${current_uv_version}" != "${branch_uv_version}" ]; then
              curl -LsSf "https://astral.sh/uv/${branch_uv_version}/install.sh" | sh
              export PATH="${HOME}/.local/bin:${PATH}"
            fi

            actual_uv_version="$(uv --version | awk '{print $2}')"
            if [ "${actual_uv_version}" != "${branch_uv_version}" ]; then
              echo "Expected uv ${branch_uv_version}, found ${actual_uv_version}" >&2
              exit 1
            fi

            uv sync --all-extras --frozen --project packages/mcp-server
            corepack pnpm --dir packages/mcp-server run metadata:sync

            changed="$(
              {
                git diff --name-only
                git ls-files --others --exclude-standard
              } | sed '/^$/d'
            )"
            if [ -z "${changed}" ]; then
              echo "No generated metadata changes for ${branch}."
              echo "::endgroup::"
              continue
            fi

            unexpected="$(printf '%s\n' "${changed}" | grep -Ev '^(packages/mcp-server/(mcp\.json|server\.json|uv\.lock)|packages/mcp-npm/package\.json)$' || true)"
            if [ -n "${unexpected}" ]; then
              echo "Unexpected release metadata changes:" >&2
              printf '%s\n' "${unexpected}" >&2
              exit 1
            fi

            git add packages/mcp-server/mcp.json packages/mcp-server/server.json packages/mcp-server/uv.lock packages/mcp-npm/package.json
            git commit -m "chore: synchronize release metadata"
            git push origin "HEAD:${branch}"
            echo "::endgroup::"
          done
