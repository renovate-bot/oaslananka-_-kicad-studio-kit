name: Publish Python

on:
  workflow_dispatch:
    inputs:
      target:
        type: choice
        options: [testpypi, pypi]
        default: testpypi
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: packages/mcp-server/uv.toml
      - run: uv sync --all-extras --frozen
        working-directory: packages/mcp-server
      - run: uv build
        working-directory: packages/mcp-server
      - run: uv run --all-extras python scripts/check_package_metadata.py
        working-directory: packages/mcp-server
      - name: Generate Python checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p packages/mcp-server/release-evidence
          (
            cd packages/mcp-server/dist
            sha256sum -- *.whl *.tar.gz
          ) > packages/mcp-server/release-evidence/SHA256SUMS.txt
      - name: Attest Python distributions
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-checksums: packages/mcp-server/release-evidence/SHA256SUMS.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-dist
          path: |
            packages/mcp-server/dist/*.whl
            packages/mcp-server/dist/*.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-release-evidence
          path: packages/mcp-server/release-evidence/SHA256SUMS.txt

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: testpypi
      url: https://test.pypi.org/p/kicad-mcp-pro
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  publish-pypi:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/kicad-mcp-pro
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist
          attestations: true
