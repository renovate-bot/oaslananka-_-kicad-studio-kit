name: Runtime Drift

on:
  pull_request:
    paths:
      - ".github/workflows/runtime-drift.yml"
      - "compatibility.yaml"
      - "docs/support-matrix.md"
      - "CONTRIBUTING.md"
      - "apps/vscode-extension/package.json"
      - "apps/vscode-extension/CHANGELOG.md"
      - "packages/mcp-server/pyproject.toml"
      - "packages/mcp-server/CHANGELOG.md"
      - "packages/mcp-server/package.json"
      - "packages/mcp-server/scripts/runtime_policy.py"
      - "packages/mcp-server/tests/unit/test_runtime_policy.py"
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: runtime-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: packages/mcp-server/uv.toml
      - run: uv sync --all-extras --frozen --project packages/mcp-server
      - name: Check runtime policy metadata
        run: uv run --project packages/mcp-server --all-extras python packages/mcp-server/scripts/runtime_policy.py check
      - name: Guard lowered runtime support
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          uv run --project packages/mcp-server --all-extras python packages/mcp-server/scripts/runtime_policy.py guard-lowering \
            --base-ref "origin/$GITHUB_BASE_REF"

  drift:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: packages/mcp-server/uv.toml
      - run: uv sync --all-extras --frozen --project packages/mcp-server
      - name: Detect upstream runtime drift
        id: drift
        run: |
          uv run --project packages/mcp-server --all-extras python packages/mcp-server/scripts/runtime_policy.py drift \
            --markdown-output runtime-drift.md \
            --json-output runtime-drift.json
          finding_count="$(python -c 'import json, pathlib; data = json.loads(pathlib.Path("runtime-drift.json").read_text(encoding="utf-8")); print(len(data["findings"]))')"
          echo "finding_count=$finding_count" >> "$GITHUB_OUTPUT"
      - name: Upload runtime drift artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtime-drift
          path: |
            runtime-drift.md
            runtime-drift.json
          if-no-files-found: warn
          retention-days: 14
      - name: Open or update runtime drift issue
        if: steps.drift.outputs.finding_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue_number="$(gh issue list --state open --label compatibility --search 'Runtime support policy drift in:title' --json number --jq '.[0].number // empty')"
          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --body-file runtime-drift.md
          else
            gh issue create \
              --title "Runtime support policy drift" \
              --label "compatibility,dependency-lifecycle,ci,product:repo" \
              --body-file runtime-drift.md
          fi
