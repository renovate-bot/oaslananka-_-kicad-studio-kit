name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 2"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@f52b05f4acaaa234e44466e66d29050e135ea9ef
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@f52b05f4acaaa234e44466e66d29050e135ea9ef
        with:
          category: "/language:${{ matrix.language }}"
