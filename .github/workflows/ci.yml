name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-lanes:
    runs-on: ubuntu-24.04
    outputs:
      metadata: ${{ steps.detect.outputs.metadata }}
      vscode_extension: ${{ steps.detect.outputs.vscode_extension }}
      shared_packages: ${{ steps.detect.outputs.shared_packages }}
      integration_contracts: ${{ steps.detect.outputs.integration_contracts }}
      performance_budgets: ${{ steps.detect.outputs.performance_budgets }}
      real_pair_compatibility: ${{ steps.detect.outputs.real_pair_compatibility }}
      run_all: ${{ steps.detect.outputs.run_all }}
      changed_file_count: ${{ steps.detect.outputs.changed_file_count }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - id: detect
        name: Detect changed CI lanes
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/check-ci-lanes.mjs --github-output --summary

  metadata:
    needs: ci-lanes
    if: ${{ needs.ci-lanes.outputs.metadata == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm run check:forbidden-refs
      - run: corepack pnpm run check:boundaries
      - run: corepack pnpm run check:version
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: corepack pnpm run check:compatibility-contract
      - run: corepack pnpm run check:governance
      - run: corepack pnpm run check:agent-configs

  vscode-extension:
    needs: ci-lanes
    if: ${{ needs.ci-lanes.outputs.vscode_extension == 'true' }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025-vs2026, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter kicadstudiokit run format:check
      - run: corepack pnpm --filter kicadstudiokit run lint
      - run: corepack pnpm --filter kicadstudiokit run typecheck
      - run: corepack pnpm --filter kicadstudiokit run test:unit:coverage
      - name: Upload coverage summary
        if: matrix.os == 'ubuntu-24.04' && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-summary
          path: apps/vscode-extension/coverage/coverage-summary.json
          if-no-files-found: ignore
      - name: Use runner Chrome with Playwright Linux dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 6
        run: |
          corepack pnpm --filter kicadstudiokit exec playwright install-deps chromium
          google-chrome --version
          echo "KICADSTUDIO_PLAYWRIGHT_CHANNEL=chrome" >> "$GITHUB_ENV"
      - name: Use runner Chrome for Playwright macOS tests
        if: runner.os == 'macOS'
        timeout-minutes: 6
        run: |
          if [ -x "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" ]; then
            "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --version
          elif command -v google-chrome >/dev/null 2>&1; then
            google-chrome --version
          else
            echo "::error::Google Chrome is not available on this macOS runner."
            exit 1
          fi
          echo "KICADSTUDIO_PLAYWRIGHT_CHANNEL=chrome" >> "$GITHUB_ENV"
      - name: Use runner Chrome for Playwright Windows tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $chromePath = (Get-Command chrome.exe -ErrorAction SilentlyContinue).Source
          if (-not $chromePath) {
            $chromePath = Join-Path $env:ProgramFiles "Google\Chrome\Application\chrome.exe"
          }
          if (-not (Test-Path $chromePath)) {
            throw "Google Chrome is not available on this Windows runner."
          }
          & $chromePath --version
          "KICADSTUDIO_PLAYWRIGHT_CHANNEL=chrome" >> $env:GITHUB_ENV
      - run: corepack pnpm --filter kicadstudiokit run test:webview
      - name: Run E2E viewer tests
        if: runner.os == 'Linux'
        timeout-minutes: 15
        run: xvfb-run -a corepack pnpm --filter kicadstudiokit run test:e2e
      - name: Run visual regression snapshots
        if: runner.os == 'Windows'
        timeout-minutes: 15
        run: corepack pnpm --filter kicadstudiokit run test:visual
      - run: corepack pnpm --filter kicadstudiokit run test:a11y
      - run: corepack pnpm --filter kicadstudiokit run build
      - if: runner.os == 'Linux'
        run: xvfb-run -a corepack pnpm --filter kicadstudiokit run test:integration
      - if: runner.os != 'Linux'
        run: corepack pnpm --filter kicadstudiokit run test:integration
      - run: corepack pnpm --filter kicadstudiokit run package
      - name: Verify extension package and no VS Code Web target
        run: corepack pnpm --filter kicadstudiokit run package:validate

  shared-packages:
    needs: ci-lanes
    if: ${{ needs.ci-lanes.outputs.shared_packages == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm run check:fixtures

  performance-budgets:
    needs: ci-lanes
    if: ${{ needs.ci-lanes.outputs.performance_budgets == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Measure extension performance budgets
        env:
          KICAD_EXTENSION_PERFORMANCE_MEASUREMENTS_JSON: performance-results/extension-performance.json
        run: corepack pnpm --filter kicadstudiokit run test:perf
      - name: Check performance budgets
        run: >-
          node scripts/check-performance-budgets.mjs
          --measurements performance-results/extension-performance.json
          --output performance-results/budget-report.json
      - name: Upload performance budget artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: performance-budget-artifacts
          path: performance-results
          if-no-files-found: error
          retention-days: 14

  real-pair-compatibility:
    needs: ci-lanes
    if: ${{ needs.ci-lanes.outputs.real_pair_compatibility == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Run real-pair compatibility tests
        env:
          REAL_SERVER_ARTIFACT_DIR: apps/vscode-extension/test-results/real-server
        run: corepack pnpm --filter kicadstudiokit run test:integration:real
      - name: Run real-pair extension host test
        env:
          REAL_SERVER_ARTIFACT_DIR: apps/vscode-extension/test-results/real-server
        run: xvfb-run -a corepack pnpm --filter kicadstudiokit run test:integration:real:host
      - name: Run real-pair VS Code host smoke
        env:
          REAL_SERVER_ARTIFACT_DIR: apps/vscode-extension/test-results/real-server
        run: xvfb-run -a corepack pnpm --filter kicadstudiokit run test:e2e:real
      - name: Upload real-pair failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: real-pair-compatibility-artifacts
          path: |
            apps/vscode-extension/test-results/real-server
            apps/vscode-extension/test-results
          if-no-files-found: ignore
          retention-days: 7

  coverage-report:
    needs: vscode-extension
    if: github.event_name == 'pull_request' && needs.vscode-extension.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: coverage-summary
      - uses: MishaKav/jest-coverage-comment@fb83bcbaeb5ca467936175796f862a2992938833
        with:
          coverage-summary-path: coverage-summary.json
          title: Coverage Report

  forbidden-refs:
    needs: ci-lanes
    if: ${{ needs.ci-lanes.outputs.metadata == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm run check:forbidden-refs
