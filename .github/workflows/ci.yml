name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: packages/mcp-server/uv.toml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm run check:forbidden-refs
      - run: corepack pnpm run check:boundaries
      - run: corepack pnpm run check:version
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: corepack pnpm run check:compatibility
      - run: corepack pnpm run check:governance

  vscode-extension:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025-vs2026, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter kicadstudio run format:check
      - run: corepack pnpm --filter kicadstudio run lint
      - run: corepack pnpm --filter kicadstudio run typecheck
      - run: corepack pnpm --filter kicadstudio run test:unit:coverage
      - if: runner.os == 'Linux'
        run: corepack pnpm --filter kicadstudio exec playwright install --with-deps chromium
      - if: runner.os != 'Linux'
        run: corepack pnpm --filter kicadstudio exec playwright install chromium
      - run: corepack pnpm --filter kicadstudio run test:a11y
      - run: corepack pnpm --filter kicadstudio run build
      - run: corepack pnpm --filter kicadstudio run package
      - name: Verify extension package and no VS Code Web target
        run: corepack pnpm --filter kicadstudio run package:validate

  mcp-server:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025-vs2026, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: packages/mcp-server/uv.toml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: uv sync --all-extras --frozen --project packages/mcp-server
      - run: corepack pnpm --dir packages/mcp-server run metadata:check
      - run: corepack pnpm --dir packages/mcp-server run format:check
      - run: corepack pnpm --dir packages/mcp-server run lint
      - run: corepack pnpm --dir packages/mcp-server run typecheck
      - run: corepack pnpm --dir packages/mcp-server run test:unit
      - run: corepack pnpm --dir packages/mcp-server run mcp:manifest:check
      - run: corepack pnpm --dir packages/mcp-server run package:check

  performance-budgets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: packages/mcp-server/uv.toml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: uv sync --all-extras --frozen --project packages/mcp-server
      - name: Measure MCP performance budgets
        env:
          KICAD_PERFORMANCE_MEASUREMENTS_JSON: performance-results/mcp-tools-list.json
        run: uv run --project packages/mcp-server --all-extras pytest packages/mcp-server/tests/unit/test_benchmark_latency.py
      - name: Check performance budgets
        run: >-
          node scripts/check-performance-budgets.mjs
          --measurements performance-results/mcp-tools-list.json
          --output performance-results/budget-report.json
      - name: Upload performance budget artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: performance-budget-artifacts
          path: performance-results
          if-no-files-found: error
          retention-days: 14

  real-pair-compatibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: packages/mcp-server/uv.toml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: uv sync --all-extras --frozen --project packages/mcp-server
      - name: Run real-pair compatibility tests
        env:
          REAL_SERVER_ARTIFACT_DIR: apps/vscode-extension/test-results/real-server
        run: corepack pnpm --filter kicadstudio run test:integration:real
      - name: Run real-pair extension host test
        env:
          REAL_SERVER_ARTIFACT_DIR: apps/vscode-extension/test-results/real-server
        run: xvfb-run -a corepack pnpm --filter kicadstudio run test:integration:real:host
      - name: Run real-pair VS Code host smoke
        env:
          REAL_SERVER_ARTIFACT_DIR: apps/vscode-extension/test-results/real-server
        run: xvfb-run -a corepack pnpm --filter kicadstudio run test:e2e:real
      - name: Upload real-pair failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: real-pair-compatibility-artifacts
          path: |
            apps/vscode-extension/test-results/real-server
            apps/vscode-extension/test-results
          if-no-files-found: ignore
          retention-days: 7

  mcp-npm:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025-vs2026, macos-15]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/mcp-npm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: npm ci --ignore-scripts=false
      - run: npm pack --dry-run
      - run: node bin/kicad-mcp-pro.js --help || true

  forbidden-refs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm run check:forbidden-refs
