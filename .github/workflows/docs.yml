name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.16.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: packages/mcp-server/uv.toml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: uv sync --all-extras --frozen
        working-directory: packages/mcp-server
      - run: corepack pnpm run check:docs-site
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        id: upload-pages
        with:
          path: site
      - name: Deploy GitHub Pages
        if: github.event_name != 'pull_request'
        env:
          ARTIFACT_ID: ${{ steps.upload-pages.outputs.artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          oidc_response="$(curl -fsSL \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}")"
          oidc_token="$(jq -r '.value' <<< "${oidc_response}")"

          deployment_response="$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${GITHUB_REPOSITORY}/pages/deployments" \
            -F artifact_id="${ARTIFACT_ID}" \
            -F environment="github-pages" \
            -F pages_build_version="${GITHUB_SHA}" \
            -F oidc_token="${oidc_token}")"

          deployment_id="$(jq -r '.id' <<< "${deployment_response}")"
          status_url="$(jq -r '.status_url' <<< "${deployment_response}")"
          status_path="${status_url#https://api.github.com}"
          page_url="$(jq -r '.page_url // empty' <<< "${deployment_response}")"

          echo "Created Pages deployment ${deployment_id}"
          if [[ -n "${page_url}" ]]; then
            echo "Page URL: ${page_url}"
          fi

          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            status="$(gh api "${status_path}" --jq '.status')"
            case "${status}" in
              succeed)
                echo "Pages deployment succeeded."
                exit 0
                ;;
              deployment_failed|deployment_content_failed|deployment_cancelled|deployment_lost)
                echo "Pages deployment failed with status: ${status}" >&2
                exit 1
                ;;
              *)
                echo "Pages deployment status: ${status}"
                sleep 5
                ;;
            esac
          done

          echo "Timed out waiting for Pages deployment ${deployment_id}" >&2
          if ! gh api --method POST "/repos/${GITHUB_REPOSITORY}/pages/deployments/${deployment_id}/cancel" >/dev/null; then
            echo "Pages deployment cancel request failed for ${deployment_id}" >&2
          fi
          exit 1
