name: Publish MCP Container

on:
  pull_request:
    paths:
      - "packages/mcp-server/Dockerfile"
      - "packages/mcp-server/Dockerfile.kicad10"
      - "packages/mcp-server/.dockerignore"
      - "packages/mcp-server/docker-entrypoint.sh"
      - "packages/mcp-server/pyproject.toml"
      - "packages/mcp-server/uv.lock"
      - "packages/mcp-server/src/**"
      - "packages/mcp-server/scripts/check_docker_metadata.py"
      - "packages/mcp-server/tests/unit/test_docker_image.py"
      - "packages/mcp-server/tests/unit/test_release_hardening.py"
      - ".github/workflows/publish-mcp-container.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Push the resolved image tags to GHCR.
        type: boolean
        default: false
      version:
        description: Optional image version tag for manual publishes.
        type: string
        required: false

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/oaslananka/kicad-mcp-pro
  LATEST_IMAGE: ghcr.io/oaslananka/kicad-mcp-pro:latest
  BINFMT_IMAGE: tonistiigi/binfmt:qemu-v10.0.4@sha256:8f58e6214f4cc9dc83ce8f5acad1ece508eb6b20e696a8c1e9f274481982c541
  BUILDKIT_IMAGE: moby/buildkit:v0.26.2@sha256:de10faf919fc71ba4eb1dd7bd6449566d012b0c9436b1c61bfee21d621b009aa

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        with:
          image: ${{ env.BINFMT_IMAGE }}
          platforms: arm64
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
        with:
          driver-opts: image=${{ env.BUILDKIT_IMAGE }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.IMAGE_NAME }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: packages/mcp-server
          file: packages/mcp-server/Dockerfile
          platforms: linux/amd64
          load: true
          tags: kicad-mcp-pro:ci
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KICAD_MCP_VERSION=0.0.0
            VCS_REF=${{ github.sha }}
      - run: docker run --rm kicad-mcp-pro:ci --help
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: image
          image-ref: kicad-mcp-pro:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          version: v0.70.0
      - name: Verify multi-arch build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: packages/mcp-server
          file: packages/mcp-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          outputs: type=cacheonly
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KICAD_MCP_VERSION=0.0.0
            VCS_REF=${{ github.sha }}

  publish:
    if: ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'mcp-server-v')) || (github.event_name == 'workflow_dispatch' && inputs.publish == true) }}
    needs: validate
    runs-on: ubuntu-24.04
    environment:
      name: ghcr
      url: https://github.com/oaslananka/kicad-studio-kit/pkgs/container/kicad-mcp-pro
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        with:
          image: ${{ env.BINFMT_IMAGE }}
          platforms: arm64
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
        with:
          driver-opts: image=${{ env.BUILDKIT_IMAGE }}
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: image
        name: Resolve image tags
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease || false }}
          DISPATCH_VERSION: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            version="${RELEASE_TAG#mcp-server-v}"
            prerelease="${RELEASE_PRERELEASE}"
          else
            version="${DISPATCH_VERSION}"
            if [ -z "${version}" ]; then
              version="$(python -c 'import tomllib; from pathlib import Path; print(tomllib.loads(Path("packages/mcp-server/pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
            fi
            prerelease=true
          fi

          case "${version}" in
            ""|*[^0-9A-Za-z._-]*)
              echo "Invalid image version tag: ${version}" >&2
              exit 1
              ;;
          esac

          {
            echo "version=${version}"
            echo "tags<<TAGS"
            echo "${IMAGE_NAME}:${version}"
            if [ "${prerelease}" != "true" ]; then
              echo "${LATEST_IMAGE}"
            fi
            echo "TAGS"
          } >> "${GITHUB_OUTPUT}"
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image.outputs.version }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: packages/mcp-server
          file: packages/mcp-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KICAD_MCP_VERSION=${{ steps.image.outputs.version }}
            VCS_REF=${{ github.sha }}
          sbom: true
          provenance: mode=max
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          version: v0.70.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: v3.0.6
      - name: Sign image digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
