name: VSIX build

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vsix-build-${{ github.ref }}
  cancel-in-progress: true

env:
  pnpm_config_pm_on_fail: ignore

jobs:
  build:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@11.6.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter kicadstudiokit run build
      - run: corepack pnpm --filter kicadstudiokit run package
      - run: corepack pnpm --filter kicadstudiokit run package:validate
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kicad-studio-vsix
          path: apps/vscode-extension/*.vsix
          if-no-files-found: error
          retention-days: 90
