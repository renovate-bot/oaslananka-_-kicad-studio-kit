name: Gitleaks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install gitleaks
        shell: bash
        env:
          GITLEAKS_VERSION: v8.30.1
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz" -o "${tmp}/gitleaks.tar.gz"
          tar -xzf "${tmp}/gitleaks.tar.gz" -C "${tmp}" gitleaks
          sudo install -m 0755 "${tmp}/gitleaks" /usr/local/bin/gitleaks
      - run: gitleaks detect --source . --redact --verbose
