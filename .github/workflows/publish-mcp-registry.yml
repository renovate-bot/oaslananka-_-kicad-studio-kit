name: Publish MCP Registry

on:
  pull_request:
    paths:
      - "apps/kicad-mcp-pro/**"
      - "packages/mcp-server/**"
      - "packages/mcp-npm/**"
      - ".github/workflows/publish-mcp-registry.yml"
      - "compatibility.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: packages/mcp-server/uv.toml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: uv sync --all-extras --frozen --project packages/mcp-server
      - run: corepack pnpm --dir packages/mcp-server run metadata:check
      - run: corepack pnpm --dir packages/mcp-server run mcp:manifest:check
      - run: corepack pnpm --dir packages/mcp-server run publish:mcp:dry-run

  publish:
    needs: validate
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
    runs-on: ubuntu-24.04
    environment: mcp-registry
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/mcp-server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install mcp-publisher
        shell: bash
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
        run: |
          set -euo pipefail
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_${os}_${arch}.tar.gz" -o "${tmp}/mcp-publisher.tar.gz"
          tar -xzf "${tmp}/mcp-publisher.tar.gz" -C "${tmp}" mcp-publisher
          sudo install -m 0755 "${tmp}/mcp-publisher" /usr/local/bin/mcp-publisher
      - run: mcp-publisher --help
      - run: mcp-publisher login github-oidc
      - name: Publish
        run: mcp-publisher publish
