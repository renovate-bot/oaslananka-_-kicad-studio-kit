name: Publish extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: >-
          Git tag for the release to publish. When set, the workflow checks out
          and publishes assets from that tag. Overrides the default ref.
        type: string
        required: false
      publish_vscode:
        description: Publish to Visual Studio Marketplace.
        type: boolean
        default: true
      publish_openvsx:
        description: Publish to Open VSX after Visual Studio Marketplace succeeds.
        type: boolean
        default: true
      publish_prerelease:
        description: Mark the VSIX and marketplace submissions as pre-release.
        type: boolean
        default: false

permissions:
  contents: read

# Serialize publishes per release tag and never cancel an in-flight publish:
# interrupting mid-upload could leave a registry partially updated.
concurrency:
  group: publish-extension-${{ github.event.release.tag_name || inputs.release_tag || github.ref }}
  cancel-in-progress: false

env:
  OPENVSX_PRERELEASE_TAG_SUFFIX: -openvsx
  pnpm_config_pm_on_fail: ignore

jobs:
  package:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      is_prerelease: ${{ steps.release-policy.outputs.is_prerelease }}
      openvsx_prerelease_allowed: ${{ steps.release-policy.outputs.openvsx_prerelease_allowed }}
      release_tag: ${{ steps.release-policy.outputs.release_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ inputs.release_tag || github.event.release.tag_name || github.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@11.6.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter kicadstudiokit run build
      - name: Evaluate extension pre-release policy
        id: release-policy
        shell: bash
        env:
          WORKFLOW_DISPATCH_PRERELEASE: ${{ inputs.publish_prerelease || false }}
          WORKFLOW_DISPATCH_TAG: ${{ inputs.release_tag || '' }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          release_tag="${WORKFLOW_DISPATCH_TAG:-${RELEASE_TAG_NAME:-${GITHUB_REF_NAME:-}}}"
          is_prerelease="false"
          if [[ "${RELEASE_IS_PRERELEASE:-false}" == "true" || "${WORKFLOW_DISPATCH_PRERELEASE:-false}" == "true" || "$release_tag" == *"-beta."* ]]; then
            is_prerelease="true"
          fi
          openvsx_prerelease_allowed="true"

          if [[ "$GITHUB_EVENT_NAME" == "release" && "$is_prerelease" == "true" && "$release_tag" != *"-beta."* && "$release_tag" != *"$OPENVSX_PRERELEASE_TAG_SUFFIX" ]]; then
            openvsx_prerelease_allowed="false"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "is_prerelease=${is_prerelease}"
            echo "openvsx_prerelease_allowed=${openvsx_prerelease_allowed}"
          } >> "$GITHUB_OUTPUT"
      - name: Package extension
        env:
          KICAD_STUDIO_EXTENSION_PRE_RELEASE: ${{ steps.release-policy.outputs.is_prerelease }}
        run: corepack pnpm --filter kicadstudiokit run package
      - run: corepack pnpm --filter kicadstudiokit run package:validate
      - name: Generate release assets and provenance
        env:
          RELEASE_TAG: ${{ steps.release-policy.outputs.release_tag }}
        run: corepack pnpm --filter kicadstudiokit run release:assets
      - name: Stage extension release evidence
        id: stage-evidence
        shell: bash
        run: |
          set -euo pipefail
          evidence_dir="release-assets/vscode-extension"
          mkdir -p "$evidence_dir"
          VSIX_PATH="$(find apps/vscode-extension -maxdepth 2 -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$VSIX_PATH"
          test -f "$VSIX_PATH"
          cp "$VSIX_PATH" "$evidence_dir/"
          cp apps/vscode-extension/SHA256SUMS.txt "$evidence_dir/"
          cp apps/vscode-extension/sbom.cdx.json "$evidence_dir/"
          cp apps/vscode-extension/provenance.json "$evidence_dir/"
          cp apps/vscode-extension/release-summary.md "$evidence_dir/"
          (cd "$evidence_dir" && sha256sum --check SHA256SUMS.txt)
          echo "vsix_name=$(basename "$VSIX_PATH")" >> "$GITHUB_OUTPUT"
      - name: Attest extension assets
        id: attest-extension
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-checksums: release-assets/vscode-extension/SHA256SUMS.txt
          sbom-path: release-assets/vscode-extension/sbom.cdx.json
      - name: Store extension release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: extension-release-evidence
          path: release-assets/vscode-extension
          if-no-files-found: error
          retention-days: 14
      - name: Attach extension evidence to GitHub Release
        if: ${{ github.event_name == 'release' || inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-policy.outputs.release_tag }}
        run: |
          set -euo pipefail
          upload_dir="release-assets/upload/vscode-extension"
          mkdir -p "$upload_dir"
          cp release-assets/vscode-extension/*.vsix "$upload_dir/"
          cp release-assets/vscode-extension/SHA256SUMS.txt "$upload_dir/vscode-extension-SHA256SUMS.txt"
          cp release-assets/vscode-extension/sbom.cdx.json "$upload_dir/vscode-extension-sbom.cdx.json"
          cp release-assets/vscode-extension/provenance.json "$upload_dir/vscode-extension-provenance.json"
          cp release-assets/vscode-extension/release-summary.md "$upload_dir/vscode-extension-release-summary.md"
          gh release upload "$RELEASE_TAG" "$upload_dir"/* --clobber

  publish_vscode:
    needs: package
    if: ${{ (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && (github.event_name == 'release' || inputs.publish_vscode) }}
    runs-on: ubuntu-24.04
    environment: extension-marketplaces
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ needs.package.outputs.release_tag || github.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@11.6.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - name: Download extension release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: extension-release-evidence
          path: release-assets/vscode-extension
      - name: Verify extension checksums before Marketplace publish
        shell: bash
        run: |
          set -euo pipefail
          (cd release-assets/vscode-extension && sha256sum --check SHA256SUMS.txt)
      - name: Verify extension identity before Marketplace publish
        shell: bash
        run: |
          set -euo pipefail
          VSIX_DIR="$GITHUB_WORKSPACE/release-assets/vscode-extension"
          VSIX_PATH="$(find "$VSIX_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$VSIX_PATH"
          corepack pnpm --filter kicadstudiokit exec node scripts/validate-vsix-metadata.js "$VSIX_PATH"
      - name: Publish Visual Studio Marketplace
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          VSIX_DIR="$GITHUB_WORKSPACE/release-assets/vscode-extension"
          VSIX_PATH="$(find "$VSIX_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$VSIX_PATH"
          test -f "$VSIX_PATH"
          test -n "$VSCE_PAT"
          publish_args=(
            publish
            --packagePath
            "$VSIX_PATH"
            --pat
            "$VSCE_PAT"
          )
          if [[ "${{ needs.package.outputs.is_prerelease }}" == "true" ]]; then
            publish_args+=(--pre-release)
          fi

          corepack pnpm --filter kicadstudiokit exec vsce "${publish_args[@]}"
      - name: Verify Visual Studio Marketplace publish status
        id: marketplace_index
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./apps/vscode-extension/package.json').version")"
          # The publish step above is the source of truth: a successful
          # `vsce publish` means the version is published. Marketplace *indexing*
          # is asynchronous and routinely takes longer than this poll window, so
          # a timeout here is indexing lag, NOT a publish failure. Treat it as
          # advisory: never fail the job (which would also skip the Open VSX
          # publish), and record whether indexing was confirmed so the content
          # verification below only runs when the version is actually served.
          indexed=false
          for attempt in $(seq 1 20); do
            if corepack pnpm --filter kicadstudiokit exec vsce show oaslananka.kicadstudiokit --json 2>/dev/null | grep -q "\"$version\""; then
              echo "VS Code Marketplace indexed version $version on attempt $attempt"
              indexed=true
              break
            fi
            echo "VS Code Marketplace index not updated yet (attempt $attempt/20), waiting 30s…"
            [ "$attempt" -lt 20 ] && sleep 30
          done
          echo "indexed=$indexed" >> "$GITHUB_OUTPUT"
          if [ "$indexed" != "true" ]; then
            echo "::warning::VS Code Marketplace did not surface $version within the polling window. The publish step reported success, so this is marketplace indexing lag rather than a publish failure; skipping content verification."
          fi
      - name: Verify Visual Studio Marketplace published content
        if: steps.marketplace_index.outputs.indexed == 'true'
        shell: bash
        run: |
          # Not `set -e`: the vspackage *binary* is served behind the gallery
          # metadata index, so right after publish the download can still 404
          # even though `vsce show` already lists the version. That serving lag
          # is not a publish failure (the publish step is the source of truth)
          # and must not fail the job, which would also skip the Open VSX publish.
          set -uo pipefail
          version="$(node -p "require('./apps/vscode-extension/package.json').version")"
          VSIX_DIR="$GITHUB_WORKSPACE/release-assets/vscode-extension"
          VSIX_PATH="$(find "$VSIX_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          MARKETPLACE_VERIFY_DIR="$GITHUB_WORKSPACE/release-assets/marketplace-verify"
          MARKETPLACE_VSIX="$MARKETPLACE_VERIFY_DIR/oaslananka.kicadstudiokit-$version.vsix"
          mkdir -p "$MARKETPLACE_VERIFY_DIR"
          url="https://marketplace.visualstudio.com/_apis/public/gallery/publishers/oaslananka/vsextensions/kicadstudiokit/$version/vspackage"
          downloaded=false
          for attempt in $(seq 1 10); do
            if curl --fail --location --retry 3 --retry-all-errors \
              --output "$MARKETPLACE_VSIX" "$url"; then
              downloaded=true
              break
            fi
            echo "Marketplace vspackage for $version not downloadable yet (attempt $attempt/10), waiting 30s…"
            [ "$attempt" -lt 10 ] && sleep 30
          done
          if [ "$downloaded" != "true" ]; then
            echo "::warning::Marketplace did not serve the $version vspackage within the verification window. The publish step reported success, so this is serving lag rather than a publish failure; skipping content comparison."
            exit 0
          fi
          if ! corepack pnpm --filter kicadstudiokit exec node scripts/validate-vsix-metadata.js \
            --compare-content "$VSIX_PATH" "$MARKETPLACE_VSIX"; then
            echo "::error::Published Marketplace content does not match the release VSIX for $version."
            exit 1
          fi

  publish_openvsx:
    needs: [package, publish_vscode]
    if: ${{ (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && always() && needs.package.result == 'success' && (needs.publish_vscode.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.publish_vscode == false)) && (github.event_name == 'release' || inputs.publish_openvsx) && needs.package.outputs.openvsx_prerelease_allowed == 'true' }}
    continue-on-error: true
    runs-on: ubuntu-24.04
    environment: extension-marketplaces
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ needs.package.outputs.release_tag || github.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@11.6.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - name: Download extension release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: extension-release-evidence
          path: release-assets/vscode-extension
      - name: Verify extension checksums before Open VSX publish
        shell: bash
        run: |
          set -euo pipefail
          (cd release-assets/vscode-extension && sha256sum --check SHA256SUMS.txt)
      - name: Verify extension identity before Open VSX publish
        shell: bash
        run: |
          set -euo pipefail
          VSIX_DIR="$GITHUB_WORKSPACE/release-assets/vscode-extension"
          VSIX_PATH="$(find "$VSIX_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$VSIX_PATH"
          corepack pnpm --filter kicadstudiokit exec node scripts/validate-vsix-metadata.js "$VSIX_PATH"
      - name: Publish Open VSX
        shell: bash
        env:
          BASE_CONTENT_URL: https://github.com/oaslananka/kicad-studio-kit/blob/${{ github.sha }}/apps/vscode-extension
          BASE_IMAGES_URL: https://raw.githubusercontent.com/oaslananka/kicad-studio-kit/${{ github.sha }}/apps/vscode-extension
          IS_PRERELEASE: ${{ needs.package.outputs.is_prerelease }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set -euo pipefail
          VSIX_DIR="$GITHUB_WORKSPACE/release-assets/vscode-extension"
          VSIX_PATH="$(find "$VSIX_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$VSIX_PATH"
          test -f "$VSIX_PATH"
          test -n "$OVSX_PAT"

          publish_args=(
            --pat
            "$OVSX_PAT"
            publish
            --packagePath
            "$VSIX_PATH"
            --baseContentUrl
            "$BASE_CONTENT_URL"
            --baseImagesUrl
            "$BASE_IMAGES_URL"
          )
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            publish_args+=(--pre-release)
          fi

          corepack pnpm --filter kicadstudiokit exec ovsx "${publish_args[@]}"
      - name: Verify Open VSX published content
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./apps/vscode-extension/package.json').version")"
          OPENVSX_VERIFY_DIR="$GITHUB_WORKSPACE/release-assets/openvsx-verify"
          mkdir -p "$OPENVSX_VERIFY_DIR"
          indexed=false
          for attempt in $(seq 1 10); do
            if corepack pnpm --filter kicadstudiokit exec ovsx get oaslananka.kicadstudiokit --metadata --versionRange "$version" > "$OPENVSX_VERIFY_DIR/metadata.json" 2>/dev/null; then
              if grep -q "\"$version\"" "$OPENVSX_VERIFY_DIR/metadata.json"; then
                echo "Open VSX indexed version $version on attempt $attempt"
                indexed=true
                break
              fi
            fi
            echo "Open VSX index not updated yet (attempt $attempt/10), waiting 30s…"
            sleep 30
          done
          if [ "$indexed" = "false" ]; then
            echo "::error::Open VSX version $version not visible after 10 attempts"
            exit 1
          fi
          corepack pnpm --filter kicadstudiokit exec ovsx get oaslananka.kicadstudiokit --versionRange "$version" --output "$OPENVSX_VERIFY_DIR"
          downloaded="$(find "$OPENVSX_VERIFY_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$downloaded"
          VSIX_DIR="$GITHUB_WORKSPACE/release-assets/vscode-extension"
          VSIX_PATH="$(find "$VSIX_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          corepack pnpm --filter kicadstudiokit exec node scripts/validate-vsix-metadata.js \
            --compare-content "$VSIX_PATH" "$downloaded"
