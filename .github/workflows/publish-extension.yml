name: Publish extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_vscode:
        description: Publish to Visual Studio Marketplace.
        type: boolean
        default: true
      publish_openvsx:
        description: Publish to Open VSX after Visual Studio Marketplace succeeds.
        type: boolean
        default: true
      publish_prerelease:
        description: Mark the VSIX and marketplace submissions as pre-release.
        type: boolean
        default: false

permissions:
  contents: read

env:
  OPENVSX_PRERELEASE_TAG_SUFFIX: -openvsx

jobs:
  package:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      is_prerelease: ${{ steps.release-policy.outputs.is_prerelease }}
      openvsx_prerelease_allowed: ${{ steps.release-policy.outputs.openvsx_prerelease_allowed }}
      release_tag: ${{ steps.release-policy.outputs.release_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter kicadstudiokit run build
      - name: Evaluate extension pre-release policy
        id: release-policy
        shell: bash
        env:
          WORKFLOW_DISPATCH_PRERELEASE: ${{ inputs.publish_prerelease || false }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          release_tag="${RELEASE_TAG_NAME:-${GITHUB_REF_NAME:-}}"
          is_prerelease="false"
          if [[ "${RELEASE_IS_PRERELEASE:-false}" == "true" || "${WORKFLOW_DISPATCH_PRERELEASE:-false}" == "true" || "$release_tag" == *"-beta."* ]]; then
            is_prerelease="true"
          fi
          openvsx_prerelease_allowed="true"

          if [[ "$GITHUB_EVENT_NAME" == "release" && "$is_prerelease" == "true" && "$release_tag" != *"-beta."* && "$release_tag" != *"$OPENVSX_PRERELEASE_TAG_SUFFIX" ]]; then
            openvsx_prerelease_allowed="false"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "is_prerelease=${is_prerelease}"
            echo "openvsx_prerelease_allowed=${openvsx_prerelease_allowed}"
          } >> "$GITHUB_OUTPUT"
      - name: Package extension
        env:
          KICAD_STUDIO_EXTENSION_PRE_RELEASE: ${{ steps.release-policy.outputs.is_prerelease }}
        run: corepack pnpm --filter kicadstudiokit run package
      - run: corepack pnpm --filter kicadstudiokit run package:validate
      - run: corepack pnpm --filter kicadstudiokit run release:assets
      - name: Stage extension release evidence
        id: stage-evidence
        shell: bash
        run: |
          set -euo pipefail
          evidence_dir="release-assets/vscode-extension"
          mkdir -p "$evidence_dir"
          VSIX_PATH="$(find apps/vscode-extension -maxdepth 2 -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$VSIX_PATH"
          test -f "$VSIX_PATH"
          cp "$VSIX_PATH" "$evidence_dir/"
          cp apps/vscode-extension/SHA256SUMS.txt "$evidence_dir/"
          cp apps/vscode-extension/sbom.cdx.json "$evidence_dir/"
          (cd "$evidence_dir" && sha256sum --check SHA256SUMS.txt)
          echo "vsix_name=$(basename "$VSIX_PATH")" >> "$GITHUB_OUTPUT"
      - name: Attest extension assets
        id: attest-extension
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-checksums: release-assets/vscode-extension/SHA256SUMS.txt
          sbom-path: release-assets/vscode-extension/sbom.cdx.json
      - name: Store extension release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: extension-release-evidence
          path: release-assets/vscode-extension
          if-no-files-found: error
          retention-days: 14
      - name: Attach extension evidence to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-policy.outputs.release_tag }}
        run: |
          set -euo pipefail
          upload_dir="release-assets/upload/vscode-extension"
          mkdir -p "$upload_dir"
          cp release-assets/vscode-extension/*.vsix "$upload_dir/"
          cp release-assets/vscode-extension/SHA256SUMS.txt "$upload_dir/vscode-extension-SHA256SUMS.txt"
          cp release-assets/vscode-extension/sbom.cdx.json "$upload_dir/vscode-extension-sbom.cdx.json"
          gh release upload "$RELEASE_TAG" "$upload_dir"/* --clobber

  publish_vscode:
    needs: package
    if: ${{ github.event_name == 'release' || inputs.publish_vscode }}
    runs-on: ubuntu-24.04
    environment: extension-marketplaces
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Download extension release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: extension-release-evidence
          path: release-assets/vscode-extension
      - name: Verify extension checksums before Marketplace publish
        shell: bash
        run: |
          set -euo pipefail
          (cd release-assets/vscode-extension && sha256sum --check SHA256SUMS.txt)
      - name: Verify extension identity before Marketplace publish
        shell: bash
        run: |
          set -euo pipefail
          VSIX_DIR="$GITHUB_WORKSPACE/release-assets/vscode-extension"
          VSIX_PATH="$(find "$VSIX_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$VSIX_PATH"
          corepack pnpm --filter kicadstudiokit exec node scripts/validate-vsix-metadata.js "$VSIX_PATH"
      - name: Publish Visual Studio Marketplace
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          VSIX_DIR="$GITHUB_WORKSPACE/release-assets/vscode-extension"
          VSIX_PATH="$(find "$VSIX_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$VSIX_PATH"
          test -f "$VSIX_PATH"
          test -n "$VSCE_PAT"
          publish_args=(
            publish
            --packagePath
            "$VSIX_PATH"
            --pat
            "$VSCE_PAT"
          )
          if [[ "${{ needs.package.outputs.is_prerelease }}" == "true" ]]; then
            publish_args+=(--pre-release)
          fi

          corepack pnpm --filter kicadstudiokit exec vsce "${publish_args[@]}"
      - name: Verify Visual Studio Marketplace publish status
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./apps/vscode-extension/package.json').version")"
          corepack pnpm --filter kicadstudiokit exec vsce show oaslananka.kicadstudiokit --json > vscode-marketplace.json
          VERSION="$version" node <<'NODE'
          const fs = require("node:fs");
          const data = JSON.parse(fs.readFileSync("vscode-marketplace.json", "utf8"));
          if (!JSON.stringify(data).includes(process.env.VERSION)) {
            throw new Error(
              `Visual Studio Marketplace version not visible: ${process.env.VERSION}`,
            );
          }
          NODE

  publish_openvsx:
    needs: [package, publish_vscode]
    if: ${{ (github.event_name == 'release' || inputs.publish_openvsx) && needs.publish_vscode.result == 'success' && needs.package.outputs.openvsx_prerelease_allowed == 'true' }}
    continue-on-error: true
    runs-on: ubuntu-24.04
    environment: extension-marketplaces
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Download extension release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: extension-release-evidence
          path: release-assets/vscode-extension
      - name: Verify extension checksums before Open VSX publish
        shell: bash
        run: |
          set -euo pipefail
          (cd release-assets/vscode-extension && sha256sum --check SHA256SUMS.txt)
      - name: Verify extension identity before Open VSX publish
        shell: bash
        run: |
          set -euo pipefail
          VSIX_DIR="$GITHUB_WORKSPACE/release-assets/vscode-extension"
          VSIX_PATH="$(find "$VSIX_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$VSIX_PATH"
          corepack pnpm --filter kicadstudiokit exec node scripts/validate-vsix-metadata.js "$VSIX_PATH"
      - name: Publish Open VSX
        shell: bash
        env:
          BASE_CONTENT_URL: https://github.com/oaslananka/kicad-studio-kit/blob/${{ github.sha }}/apps/vscode-extension
          BASE_IMAGES_URL: https://raw.githubusercontent.com/oaslananka/kicad-studio-kit/${{ github.sha }}/apps/vscode-extension
          IS_PRERELEASE: ${{ needs.package.outputs.is_prerelease }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set -euo pipefail
          VSIX_DIR="$GITHUB_WORKSPACE/release-assets/vscode-extension"
          VSIX_PATH="$(find "$VSIX_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$VSIX_PATH"
          test -f "$VSIX_PATH"
          test -n "$OVSX_PAT"

          publish_args=(
            --pat
            "$OVSX_PAT"
            publish
            --packagePath
            "$VSIX_PATH"
            --baseContentUrl
            "$BASE_CONTENT_URL"
            --baseImagesUrl
            "$BASE_IMAGES_URL"
          )
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            publish_args+=(--pre-release)
          fi

          corepack pnpm --filter kicadstudiokit exec ovsx "${publish_args[@]}"
      - name: Verify Open VSX published digest
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./apps/vscode-extension/package.json').version")"
          OPENVSX_VERIFY_DIR="$GITHUB_WORKSPACE/release-assets/openvsx-verify"
          mkdir -p "$OPENVSX_VERIFY_DIR"
          for attempt in 1 2 3 4 5; do
            if corepack pnpm --filter kicadstudiokit exec ovsx get oaslananka.kicadstudiokit --metadata --versionRange "$version" > "$OPENVSX_VERIFY_DIR/metadata.json" 2>/dev/null; then
              if grep -q "\"$version\"" "$OPENVSX_VERIFY_DIR/metadata.json"; then
                echo "Open VSX indexed version $version on attempt $attempt"
                break
              fi
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Open VSX did not index version $version after 5 attempts"
              exit 1
            fi
            sleep 10
          done
          corepack pnpm --filter kicadstudiokit exec ovsx get oaslananka.kicadstudiokit --versionRange "$version" --output "$OPENVSX_VERIFY_DIR"
          downloaded="$(find "$OPENVSX_VERIFY_DIR" -type f -name '*.vsix' | sort | tail -n1)"
          test -n "$downloaded"
          expected="$(awk '{print $1}' release-assets/vscode-extension/SHA256SUMS.txt)"
          actual="$(sha256sum "$downloaded" | awk '{print $1}')"
          test "$expected" = "$actual"
